# peterdeloryphotographer.com — Peter de Lory photographer portfolio, prod-only.
# Pure static site: nginx serves /var/www/peterdeloryphotographer/www/public/
#   (repo: CoreyScherrer/peterdelory, deploy via deploy-peterdelory-www.sh)
# No daemon, no port, no app backend.
# Cloudflare tunnel terminates real TLS at the edge; origin cert is for the
#   localhost hop only (tunnel uses noTLSVerify, dashboard-configured), which is
#   why this reuses the coreyscherrer.com origin cert.
#
# INSTALL (operator, separate step — not run by the build):
#   sudo ln -s /Users/admin/Sites-wt/peter-de-lory/deploy/peterdeloryphotographer.com.conf \
#              /usr/local/etc/nginx/servers/peterdeloryphotographer.com.conf
#   sudo nginx -t && sudo nginx -s reload
# (Or copy this file into the Sites repo's scripts/nginx/ and symlink from there,
#  to match how the other domains are version-controlled.)

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name peterdeloryphotographer.com www.peterdeloryphotographer.com;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name peterdeloryphotographer.com www.peterdeloryphotographer.com;

    # Reuse existing origin cert. Cloudflare doesn't validate it (noTLSVerify on tunnel ingress).
    ssl_certificate /usr/local/etc/letsencrypt/live/coreyscherrer.com/fullchain.pem;
    ssl_certificate_key /usr/local/etc/letsencrypt/live/coreyscherrer.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Shared rate limiting — zone defined in rate_limiting.conf (included at http{}).
    limit_req zone=general_limit burst=20 nodelay;

    # Static site root.
    root /var/www/peterdeloryphotographer/www/public;
    index index.html;

    # Logs
    access_log /var/log/nginx/peterdeloryphotographer.access.log;
    error_log  /var/log/nginx/peterdeloryphotographer.error.log;

    # Security headers (public site, no auth)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static asset cache hint.
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico|map)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # Catch-all. Directory-with-index resolution (clean URLs like /the-falls/).
    # No SPA fallback — unknown paths 404 (SEO / duplicate-content reasoning).
    location / {
        try_files $uri $uri/ =404;
    }
}
